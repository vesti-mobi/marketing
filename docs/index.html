<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    (function () {
      var AUTH_KEY = "vesti.auth.ok";
      var TTL = 1000 * 60 * 60 * 8;
      try {
        var raw = sessionStorage.getItem(AUTH_KEY);
        if (raw) {
          var data = JSON.parse(raw);
          if (data && data.ts && Date.now() - data.ts < TTL) return;
        }
      } catch (e) { /* ignore */ }
      window.location.replace("login.html");
    })();
  </script>
  <title>Vesti · Dashboard de Leads</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand-pink':   '#6A52B3',
            'brand-purple': '#63C19B',
            'brand-peach':  '#549E86',
            'surface':      '#12151d',
            'surface-2':    '#181b24',
          },
          fontFamily: {
            sans: ['-apple-system','BlinkMacSystemFont','"Segoe UI"','Roboto','"Helvetica Neue"','Arial','sans-serif'],
          },
          boxShadow: {
            'glow-pink':   '0 10px 30px rgba(106,82,179,.32), inset 0 1px 0 rgba(255,255,255,.18)',
            'glow-card':   '0 20px 60px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05)',
          },
        }
      }
    }
  </script>

  <style>
    html, body { background: #0b0d12; color: #e9ecf3; }
    body {
      background:
        radial-gradient(ellipse at top left, #2B0C55 0%, transparent 55%),
        radial-gradient(ellipse at bottom right, #1a1635 0%, transparent 55%),
        #0b0d12;
      min-height: 100vh;
    }
    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse at center, #000 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse at center, #000 30%, transparent 80%);
      pointer-events: none; z-index: 0;
    }
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: 0.5; pointer-events: none; z-index: 0;
      animation: drift 18s ease-in-out infinite;
    }
    .orb-1 { width:420px; height:420px; background: radial-gradient(circle,#6A52B3 0%,transparent 70%); top:-120px; left:-80px; }
    .orb-2 { width:520px; height:520px; background: radial-gradient(circle,#63C19B 0%,transparent 70%); bottom:-160px; right:-120px; animation-delay:-6s; }
    .orb-3 { width:320px; height:320px; background: radial-gradient(circle,#549E86 0%,transparent 70%); top:40%; left:55%; opacity:0.3; animation-delay:-12s; }
    @keyframes drift { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(30px,-20px) scale(1.08); } }
    #leads-canvas { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; opacity: 0.4; }

    .card {
      background: rgba(24,27,34,0.72);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.04);
    }
    .card-gradient-border { position: relative; }
    .card-gradient-border::before {
      content: ""; position: absolute; inset: -1px; border-radius: inherit; padding: 1px;
      background: linear-gradient(135deg,#6A52B3,transparent 35%,transparent 65%,#63C19B);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
              mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
      pointer-events: none; opacity: 0.55;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }

    /* Checkbox accent */
    input[type="checkbox"] { accent-color: #6A52B3; }

    /* Recharts tooltip dark style helper */
    .recharts-default-tooltip {
      background: rgba(18,21,29,0.95) !important;
      border: 1px solid rgba(255,255,255,0.08) !important;
      border-radius: 10px !important;
    }
  </style>

  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
</head>
<body class="font-sans antialiased overflow-x-hidden">
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <canvas id="leads-canvas"></canvas>

  <div id="root" class="relative z-10"></div>

  <script type="text/babel" data-presets="react" src="js/app.jsx"></script>
</body>
</html>
